<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Weather App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body class="bg-gray-400 text-white w-full min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-6xl mx-auto relative">

  <!-- ERROR -->
  <div id="error" class="hidden bg-red-500 text-white px-4 py-2 rounded-lg mb-3"></div>

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-6 flex-wrap gap-4">

    <div class="flex items-center gap-4">
      <h1 class="text-2xl font-semibold">Weather forecast</h1>

      <div class="flex bg-white/10 rounded-full p-1">
        <button id="celsius" class="px-3 py-1.5 rounded-full text-sm bg-white text-black">°C</button>
        <button id="fahrenheit" class="px-3 py-1.5 rounded-full text-sm">°F</button>
      </div>
    </div>

    <div class="flex items-center gap-4 flex-wrap relative">
      <div class="flex items-center gap-2">
        <span id="location">--</span>
      </div>

      <div class="relative">
        <input id="search" type="text" placeholder="Search City"
          class="px-4 py-2 rounded-lg text-black outline-none" />

        <!-- DROPDOWN -->
        <div id="recent-dropdown"
          class="absolute bg-white text-black mt-1 rounded-lg shadow-lg w-full hidden z-50"></div>
      </div>
    </div>
  </div>

  <!-- 7 DAY -->
  <div class="mb-4 overflow-x-auto">
    <div id="seven-day" class="flex gap-3 min-w-max"></div>
  </div>

  <!-- MAIN -->
  <div class="grid lg:grid-cols-3 gap-4">

    <!-- CURRENT -->
    <div class="bg-white text-black rounded-2xl p-4 flex flex-col gap-4">

      <div class="relative h-48 rounded-xl overflow-hidden">
        <img id="weather-bg"
          src="https://openweathermap.org/img/widget_images/scattered_clouds.jpg"
          class="absolute w-full h-full object-cover">

        <div class="absolute inset-0 bg-black/40"></div>

        <div class="relative h-full flex flex-col justify-between p-4 text-white">
          <div class="text-right text-sm">Live</div>

          <div class="flex justify-between items-end">
            <div id="temp" class="text-5xl">--°</div>

            <div>
              <div id="desc" class="text-lg">--</div>
              <div id="feels" class="text-sm">Feels like --°</div>
            </div>
          </div>
        </div>
      </div>

      <!-- STATS -->
      <div class="grid grid-cols-3 gap-2">
        <div class="bg-orange-100 rounded-xl p-2 text-center">
          <div class="text-xs text-gray-600">Wind</div>
          <div id="wind">--</div>
        </div>

        <div class="bg-orange-100 rounded-xl p-2 text-center">
          <div class="text-xs text-gray-600">Humidity</div>
          <div id="humidity">--%</div>
        </div>

        <div class="bg-orange-100 rounded-xl p-2 text-center">
          <div class="text-xs text-gray-600">Visibility</div>
          <div id="visibility">--</div>
        </div>

        <div class="bg-orange-100 rounded-xl p-2 text-center">
          <div class="text-xs text-gray-600">Pressure</div>
          <div id="pressure">--</div>
        </div>
      </div>
    </div>

    <!-- HOURLY -->
    <div class="lg:col-span-2 bg-gray-100 text-black rounded-2xl p-4">

      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold">Hourly forecast</h2>

        <button id="use-location"
          class="bg-orange-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-orange-600">
          Use Location
        </button>
      </div>

      <div class="overflow-x-auto">
        <div id="hourly-container" class="flex gap-3 min-w-max"></div>
      </div>

    </div>
  </div>

  <div id="map" class="h-[400px] rounded-2xl overflow-hidden mt-4"></div>
</div>

<script src="script.js"></script>
</body>
</html>
